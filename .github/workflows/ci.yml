name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Typecheck, unit tests (client + payment edge-function handlers), and a
  # production build. This is the gate the audit found missing: payment code
  # can no longer change without the webhook/checkout/portal suites running.
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  # Playwright smoke tests against a production preview build. These cover
  # the public, unauthenticated surface (home, browse + pagination, listing
  # detail, navigation) — auth-gated flows are covered by component tests in
  # the vitest suite.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # The edge functions deploy onto Deno — typecheck them with the real
  # runtime's compiler so a Deno-only break can't slip past the Node suite.
  edge-functions-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: |
          deno check \
            supabase/functions/stripe-webhook/index.ts \
            supabase/functions/stripe-checkout/index.ts \
            supabase/functions/stripe-portal/index.ts \
            supabase/functions/stripe-readiness/index.ts \
            supabase/functions/_shared/stripe-signature.ts \
            supabase/functions/_shared/stripe-mode.ts \
            supabase/functions/_shared/cors.ts
